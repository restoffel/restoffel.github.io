<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>restoffel</title>
    
    <!-- Standard Styles -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Seiten-spezifische Styles -->
    <style>
        header {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        
        .earth-container {
            max-width: 800px;
            width: 90%;
            margin: 0 auto;
        }
        
        .earth-image {
            width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }
        
        .text-content {
            margin-top: 30px;
            padding: 0 20px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .signature {
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 20px;
            color: #4da6ff;
        }
        
        .image-credit {
            margin-top: 40px;
            font-size: 0.9em;
            color: #aaa;
        }
        
        .image-credit a {
            color: #4da6ff;
            text-decoration: none;
        }
        
        .image-credit a:hover {
            text-decoration: underline;
        }
        
        /* Anpassung für Sidebar */
        .main-content header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-bottom: none;
        }
        
        @media (max-width: 768px) {
            header {
                min-height: auto;
                padding: 60px 20px 40px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Hamburger Menu Button -->
    <button class="hamburger" onclick="toggleSidebar()" aria-label="Menü öffnen">
        <span></span>
        <span></span>
        <span></span>
    </button>
    
    <!-- Sidebar Navigation -->
    <nav id="sidebar">
        <div class="sidebar-header">
            <h2>restoffel</h2>
        </div>
        <ul id="sidebar-nav"></ul>
    </nav>
    
    <!-- Overlay für Mobile -->
    <div id="overlay"></div>
    
    <!-- Main Content -->
    <div class="main-content">
        <header>
            <div class="earth-container">
                <img src="https://images.unsplash.com/photo-1614729939124-032f0b56c9ce?ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1470&q=80" 
                     alt="Schönes Weltraumbild der Erde" 
                     class="earth-image">
                
                <div class="text-content">
                    <h1>Hallo hier ist meine Seite</h1>
                    <div class="signature">— restoffel</div>
                </div>
                
                <div class="image-credit">
                    Schönes Weltraumbild der Erde von <a href="https://unsplash.com/photos/earth-nasa" target="_blank">Unsplash (NASA Collection)</a>
                </div>
            </div>
        </header>
        
        <footer>
            <p>© 2026 restoffel</p>
        </footer>
    </div>
    
    <!-- Standard Navigation Script -->
    <script src="js/navigation.js"></script>
</body>
</html>

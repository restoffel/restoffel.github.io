<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>restoffel</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
            text-align: center;
        }
        
        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .earth-container {
            max-width: 800px;
            width: 90%;
            margin: 0 auto;
        }
        
        .earth-image {
            width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }
        
        .text-content {
            margin-top: 30px;
            padding: 0 20px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .signature {
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 20px;
            color: #4da6ff;
        }
        
        .image-credit {
            margin-top: 40px;
            font-size: 0.9em;
            color: #aaa;
        }
        
        .image-credit a {
            color: #4da6ff;
            text-decoration: none;
        }
        
        .image-credit a:hover {
            text-decoration: underline;
        }
        
        /* Navigation */
        nav {
            background-color: #0f0f1a;
            padding: 20px;
            border-top: 1px solid #333;
        }
        
        nav h2 {
            margin: 0 0 15px 0;
            font-size: 1.5em;
            color: #4da6ff;
        }
        
        .nav-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }
        
        .nav-list li {
            margin: 0;
        }
        
        .nav-list a {
            display: block;
            padding: 12px 24px;
            background-color: #1a1a2e;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            transition: background-color 0.3s, transform 0.2s;
            border: 1px solid #333;
        }
        
        .nav-list a:hover {
            background-color: #4da6ff;
            transform: translateY(-2px);
        }
        
        .nav-list a:active {
            transform: translateY(0);
        }
        
        footer {
            background-color: #0f0f1a;
            padding: 20px;
            margin-top: 40px;
            color: #666;
            font-size: 0.9em;
        }
        
        @media (max-width: 768px) {
            .nav-list {
                flex-direction: column;
                align-items: center;
            }
            
            .nav-list a {
                width: 80%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="earth-container">
            <img src="https://images.unsplash.com/photo-1614729939124-032f0b56c9ce?ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1470&q=80" 
                 alt="Schönes Weltraumbild der Erde" 
                 class="earth-image">
            
            <div class="text-content">
                <h1>Hallo hier ist meine Seite</h1>
                <div class="signature">— restoffel</div>
            </div>
            
            <div class="image-credit">
                Schönes Weltraumbild der Erde von <a href="https://unsplash.com/photos/earth-nasa" target="_blank">Unsplash (NASA Collection)</a>
            </div>
        </div>
    </header>
    
    <nav>
        <h2>Inhaltsverzeichnis</h2>
        <ul class="nav-list">
            <li><a href="index.html">Startseite</a></li>
            <li><a href="kinderlieder.html">Kinderlieder-Videos</a></li>
        </ul>
    </nav>
    
    <footer>
        <p>© 2026 restoffel</p>
    </footer>
</body>
</html>
